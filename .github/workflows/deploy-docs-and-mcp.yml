name: Deploy Docs (GitHub Pages) + MCP Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      SITE_BASE_URL: /${{ github.event.repository.name }}
      MCP_SERVER_NAME: my-docs
      MCP_SERVER_VERSION: 1.0.0
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (generates build/mcp/*)
        env:
          SITE_URL: ${{ env.SITE_URL }}
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
          MCP_SERVER_NAME: ${{ env.MCP_SERVER_NAME }}
          MCP_SERVER_VERSION: ${{ env.MCP_SERVER_VERSION }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages

      - name: Deploy Cloudflare Worker (MCP)
        if: ${{ env.CF_API_TOKEN != '' }}
        run: >
          npx wrangler deploy
          --config cloudflare-mcp/wrangler.toml
          --var DOCS_BASE_URL=${{ env.SITE_URL }}
          --var MCP_SERVER_NAME=${{ env.MCP_SERVER_NAME }}
          --var MCP_SERVER_VERSION=${{ env.MCP_SERVER_VERSION }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}

